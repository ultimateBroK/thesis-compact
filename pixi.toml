[workspace]
authors = ["Nguyen Duc Hieu <hieuteo03@gmail.com>"]
channels = ["conda-forge"]
name = "thesis-compact"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
run = "python main.py"
run-full = "python main.py --full"
smoke = "python main.py --months 1"
check = "ruff check src/ tests/"
test = "python -m unittest discover -s tests"

[dependencies]
python = ">=3.11,<3.13"
numpy = ">=1.26,<3"
scikit-learn = ">=1.4,<2"
lightgbm = ">=4.3,<5"
pandas = ">=2.2,<3"
polars = ">=1.0,<2"
pyarrow = ">=15,<25"
matplotlib = ">=3.8,<4"
seaborn = ">=0.13,<0.14"
jupyter = ">=1.1,<2"
ipykernel = ">=6.29,<8"
vulture = ">=2.16,<3"
ruff = ">=0.5,<0.16"
