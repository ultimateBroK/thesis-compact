[workspace]
authors = ["Nguyen Duc Hieu <hieuteo03@gmail.com>"]
channels = ["conda-forge"]
name = "thesis-compact"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
run = "python main.py"
run-full = "python main.py --full"
smoke = "python main.py --months 1"
check = "ruff check src/ tests/"
test = "python -m unittest discover -s tests"

[dependencies]
python = ">=3.12,<3.13"
numpy = ">=2.4.6,<3"
scikit-learn = ">=1.9.0,<2"
lightgbm = ">=4.6.0,<5"
pandas = ">=3.0.3,<4"
polars = ">=1.41.2,<2"
pyarrow = ">=24.0.0,<25"
matplotlib = ">=3.10.9,<4"
seaborn = ">=0.13.2,<0.14"
jupyter = ">=1.1.1,<2"
ipykernel = ">=7.2.0,<8"
vulture = ">=2.16,<3"
ruff = ">=0.15.16,<0.16"
pytest = ">=9.0.3,<10"
